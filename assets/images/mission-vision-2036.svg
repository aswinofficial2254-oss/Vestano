<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" role="img" aria-labelledby="title desc">
  <title id="title">Vestano mission and vision 2036 business transformation visual</title>
  <desc id="desc">A blue and orange strategic transformation visual with connected pillars, data paths, and a 2036 growth target.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061927"/>
      <stop offset="0.58" stop-color="#072f4d"/>
      <stop offset="1" stop-color="#0070b8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4a12c"/>
      <stop offset="1" stop-color="#ffd37a"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="920" height="620" rx="34" fill="url(#bg)"/>
  <path d="M82 488 C220 370 310 428 442 305 C585 172 687 205 823 92" fill="none" stroke="#7fd4ff" stroke-width="5" opacity=".7"/>
  <path d="M82 514 C236 410 339 460 480 335 C616 214 702 246 832 144" fill="none" stroke="url(#accent)" stroke-width="4" opacity=".92"/>
  <g opacity=".16" stroke="#fff">
